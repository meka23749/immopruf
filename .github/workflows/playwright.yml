name: ImmoPrüf QA Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: node api/server.js &

      - name: Start HTTP server for app
        run: npx http-server app -p 8080 &

      - name: Wait for HTTP server
        run: npx wait-on http://localhost:8080/index.html --timeout 30000

      - name: Wait for API server
        run: npx wait-on http://localhost:3000/api/marktdaten?stadt=Hannover --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          APP_URL: http://localhost:8080/index.html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30